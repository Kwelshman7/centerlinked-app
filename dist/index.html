    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {"@type":"Question","name":"What is CenterLinked?","acceptedAnswer":{"@type":"Answer","text":"CenterLinked is a professional referral profile platform for treatment organizations. It gives your organization one clean, always-updated link that shows referral partners who you are, what levels of care you offer, where your facilities are located, who to contact, and how to refer."}},
          {"@type":"Question","name":"Is CenterLinked a treatment directory?","acceptedAnswer":{"@type":"Answer","text":"CenterLinked is not meant to be another public treatment directory. Most directories are built for patients and families searching online. CenterLinked is built for professional referral relationships between treatment organizations, BD reps, admissions teams, clinicians, hospitals, case managers, interventionists, and other referral partners."}},
          {"@type":"Question","name":"Is CenterLinked a CRM?","acceptedAnswer":{"@type":"Answer","text":"No. CenterLinked is not meant to replace your CRM. Your CRM helps your team track contacts, tasks, outreach, and referral activity internally. CenterLinked helps your organization present accurate referral-facing information externally."}},
          {"@type":"Question","name":"Why not just send a PDF or brochure?","acceptedAnswer":{"@type":"Answer","text":"PDFs and brochures go stale quickly. A phone number changes, a BD rep leaves, a payer relationship changes, or a program updates its admission process. CenterLinked gives your team one live link that can be updated from your dashboard."}},
          {"@type":"Question","name":"Who should use CenterLinked?","acceptedAnswer":{"@type":"Answer","text":"CenterLinked is built for detox centers, residential programs, PHP programs, IOP programs, mental health programs, dual diagnosis programs, eating disorder programs, sober living providers, admissions teams, BD teams, and multi-location treatment organizations."}},
          {"@type":"Question","name":"Can our BD reps use CenterLinked in the field?","acceptedAnswer":{"@type":"Answer","text":"Yes. BD reps can use the organization link in follow-up emails, text messages, QR codes, conference materials, referral packets, and professional outreach. After a meeting or event, a rep can send one clean link instead of multiple attachments."}},
          {"@type":"Question","name":"Can we include insurance information?","acceptedAnswer":{"@type":"Answer","text":"Your organization can include general insurance or payer guidance, but benefits should always be verified through your normal admissions or verification process. CenterLinked should not be presented as an insurance verification tool."}},
          {"@type":"Question","name":"Does CenterLinked handle patient admissions?","acceptedAnswer":{"@type":"Answer","text":"No. CenterLinked is not an EMR or admissions platform. It helps organize and share referral-facing information. Actual admissions, clinical screening, insurance verification, and medical decision-making should happen through your organization's normal process."}},
          {"@type":"Question","name":"Is CenterLinked HIPAA compliant?","acceptedAnswer":{"@type":"Answer","text":"CenterLinked is intended as a professional organization and referral information platform — not as a place to store unnecessary patient health information. Treat it as a public-facing profile tool and keep PHI inside the systems built for it."}},
          {"@type":"Question","name":"Can CenterLinked help us get more referrals?","acceptedAnswer":{"@type":"Answer","text":"CenterLinked can reduce friction in the referral process by making your organization easier to understand, contact, and share. It does not guarantee referrals, but it helps your BD and admissions teams present your organization more clearly."}},
          {"@type":"Question","name":"What makes CenterLinked different from a normal website?","acceptedAnswer":{"@type":"Answer","text":"Your website is built for many audiences — patients, families, search engines, alumni, and the public. CenterLinked is built specifically for referral partners. Your website explains your brand. CenterLinked explains how to refer to you."}},
          {"@type":"Question","name":"What is the biggest benefit of CenterLinked?","acceptedAnswer":{"@type":"Answer","text":"Your organization gets one accurate, professional, shareable profile that referral partners can use instead of relying on outdated PDFs, old contact lists, scattered emails, or guesswork."}}
        ]
      }
