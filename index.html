    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {"@type":"Question","name":"What exactly is CenterLinked?","acceptedAnswer":{"@type":"Answer","text":"CenterLinked is a referral-facing profile platform for behavioral health and addiction treatment organizations. You create one professional profile showing levels of care, verified insurance, facility locations, contacts, and how to send a referral. Your BD team shares one link — everywhere, always current."}},
          {"@type":"Question","name":"How is CenterLinked different from Rehabs.com, Recovery.com, or Psychology Today?","acceptedAnswer":{"@type":"Answer","text":"Those are public directories built for patients and families searching online. Profiles are often self-reported, outdated, and say accepts insurance without naming in-network payers. CenterLinked is a private, professionals-only network for referral relationships — with verified profiles, named payers, and information built for case managers and discharge planners."}},
          {"@type":"Question","name":"Why not just send our website link?","acceptedAnswer":{"@type":"Answer","text":"Your website is built for every audience — patients, families, SEO, alumni, community. Referral partners have to dig through pages to find contacts, insurance, and referral steps. CenterLinked gives them exactly what they need in one view without the back-and-forth."}},
          {"@type":"Question","name":"Why not just send a PDF or one-pager?","acceptedAnswer":{"@type":"Answer","text":"PDFs go stale the moment something changes. Partners keep old versions, can't search across multiple PDFs, and won't maintain a folder of brochures. CenterLinked gives you one live link. Update it once and every partner stays current without a re-send."}},
          {"@type":"Question","name":"Is this just another treatment directory?","acceptedAnswer":{"@type":"Answer","text":"No. Public directories help families find treatment online. CenterLinked is a private network for professional referral relationships — clinicians, case managers, hospital discharge teams, and BD reps. Different audience, different purpose, different standard for accuracy."}},
          {"@type":"Question","name":"How is this different from our CRM?","acceptedAnswer":{"@type":"Answer","text":"Your CRM is internal — it tracks your contacts, tasks, and pipeline. CenterLinked is external — it's what your partners see about you. Your CRM helps you manage relationships. CenterLinked helps those partners understand your organization well enough to refer without calling you first."}},
          {"@type":"Question","name":"Can our BD reps use this in the field?","acceptedAnswer":{"@type":"Answer","text":"After a conference meeting, in a follow-up text, on a QR code at your booth, or in a referral packet — your reps send one link instead of attachments. When something changes, you update the profile and their link is automatically current."}},
          {"@type":"Question","name":"Can we list our insurance and payer relationships?","acceptedAnswer":{"@type":"Answer","text":"Yes. List in-network payers clearly and accurately. Referral partners make placement decisions based on insurance fit. Benefits verification still happens through your normal admissions process."}},
          {"@type":"Question","name":"Is CenterLinked HIPAA compliant?","acceptedAnswer":{"@type":"Answer","text":"CenterLinked is an organization profile platform — not a place to store patient records or clinical data. Don't put PHI in your profile. Treat it as a professional referral-facing profile."}},
          {"@type":"Question","name":"Does CenterLinked replace our admissions process?","acceptedAnswer":{"@type":"Answer","text":"No. CenterLinked helps referral partners understand your organization and reach the right contact. Clinical screening, insurance verification, and admissions decisions stay in your normal process."}},
          {"@type":"Question","name":"Will CenterLinked get us more referrals?","acceptedAnswer":{"@type":"Answer","text":"CenterLinked reduces friction. Partners who know you reach the right person faster. Partners who don't can see if you're the right fit without phone tag. Fewer missed connections and fewer misrouted referrals."}},
          {"@type":"Question","name":"What happens if we don't keep our profile updated?","acceptedAnswer":{"@type":"Answer","text":"After 30 days without confirmation, your Verified badge changes to Needs Verification and your organization stops appearing in open search until you update. Stale information loses visibility. Current information earns it."}}
        ]
      }
