services:
  - type: web
    name: centerlinked
    runtime: node
    plan: free
    region: ohio
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    domains:
      - www.centerlinked.com
      - centerlinked.com
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: SITE_URL
        value: https://www.centerlinked.com
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_BOOTSTRAP_SUPER_ADMIN_EMAILS
        sync: false
